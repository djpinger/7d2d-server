<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>7D2D Panel — Console</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/darkly/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    html, body { height: 100%; background-color: #1a1a2e; }
    .app-navbar {
      background-color: #111827;
      border-bottom: 2px solid #c0392b;
      padding: 0.5rem 1.25rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .navbar-brand-text { font-size: 1.15rem; font-weight: 700; color: #fff; letter-spacing: 0.03em; }
    .navbar-brand-text span { color: #e63946; }
    .navbar-meta { font-size: 0.8rem; color: #6c757d; margin-left: 0.75rem; }
    .content-area { padding: 1.25rem 2rem; height: calc(100vh - 56px); display: flex; flex-direction: column; }
    #log-output {
      flex: 1;
      overflow-y: auto;
      background: #0d1117;
      border: 1px solid #2d3f57;
      border-radius: 6px;
      padding: 0.75rem 1rem;
      font-family: 'Courier New', monospace;
      font-size: 0.8rem;
      line-height: 1.5;
      color: #adb5bd;
      white-space: pre-wrap;
      word-break: break-all;
    }
    #log-output .log-err  { color: #e63946; }
    #log-output .log-wrn  { color: #f0a500; }
    #log-output .log-inf  { color: #6c757d; }
    #log-output .log-chat { color: #58b4ae; font-weight: 600; }
    .cmd-bar { display: flex; gap: 0.5rem; margin-top: 0.75rem; }
    .cmd-bar input { flex: 1; background: #1f2b3e; border: 1px solid #3a5068; color: #e9ecef; border-radius: 4px; padding: 0.4rem 0.75rem; font-family: monospace; font-size: 0.88rem; }
    .cmd-bar input:focus { outline: none; border-color: #e63946; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
    .status-dot.connected    { background: #28a745; box-shadow: 0 0 6px #28a745; }
    .status-dot.disconnected { background: #e63946; }
    .status-dot.connecting   { background: #f0a500; }
    .toast-container { z-index: 9999; }
  </style>
</head>
<body>

<div class="app-navbar">
  <div class="d-flex align-items-center">
    <span class="navbar-brand-text"><span>7D2D</span> Panel</span>
    <span class="navbar-meta">{{ server_name }}</span>
  </div>
  <div class="d-flex align-items-center gap-2">
    <a href="/dashboard" class="btn btn-sm btn-outline-secondary"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a>
    <a href="/config"   class="btn btn-sm btn-outline-secondary"><i class="bi bi-sliders me-1"></i>Config</a>
    <a href="/saves"    class="btn btn-sm btn-outline-secondary"><i class="bi bi-hdd me-1"></i>Saves</a>
    <a href="/admin"    class="btn btn-sm btn-outline-secondary"><i class="bi bi-shield-lock me-1"></i>Admin</a>
    <a href="/sandbox"  class="btn btn-sm btn-outline-secondary"><i class="bi bi-code-square me-1"></i>Sandbox</a>
    <a href="/console"  class="btn btn-sm btn-danger"><i class="bi bi-terminal me-1"></i>Console</a>
    <a href="/players"  class="btn btn-sm btn-outline-secondary"><i class="bi bi-people me-1"></i>Players</a>
    <a href="/give"     class="btn btn-sm btn-outline-secondary"><i class="bi bi-box-seam me-1"></i>Give</a>
    <a href="/teleport" class="btn btn-sm btn-outline-secondary"><i class="bi bi-geo-alt me-1"></i>Teleport</a>
    <a href="/logout"   class="btn btn-sm btn-outline-danger ms-1"><i class="bi bi-box-arrow-right me-1"></i>Logout</a>
  </div>
</div>

<div class="content-area">
  <div class="d-flex align-items-center mb-2 gap-2">
    <span id="statusDot" class="status-dot connecting"></span>
    <small id="statusText" style="color:#6c757d">Connecting…</small>
    <button class="btn btn-sm btn-outline-secondary ms-auto" id="clearBtn"><i class="bi bi-trash me-1"></i>Clear</button>
    <label class="form-check-label text-secondary" style="font-size:0.82rem">
      <input type="checkbox" id="autoScroll" class="form-check-input" checked> Auto-scroll
    </label>
  </div>
  <div id="log-output"></div>
  <form class="cmd-bar" id="cmdForm">
    <input type="text" id="cmdInput" placeholder="Enter console command…" autocomplete="off" autocorrect="off" spellcheck="false">
    <button type="submit" class="btn btn-sm btn-danger"><i class="bi bi-send me-1"></i>Run</button>
  </form>
</div>

<div class="toast-container position-fixed top-0 end-0 p-3">
  <div id="mainToast" class="toast" role="alert">
    <div class="d-flex">
      <div class="toast-body" id="toastMsg"></div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
const logOutput   = document.getElementById('log-output');
const statusDot   = document.getElementById('statusDot');
const statusText  = document.getElementById('statusText');
const autoScroll  = document.getElementById('autoScroll');
const MAX_LINES   = 2000;
let lineCount = 0;

function toast(msg, ok=true) {
  const el = document.getElementById('mainToast');
  document.getElementById('toastMsg').textContent = msg;
  el.className = `toast text-bg-${ok ? 'success' : 'danger'}`;
  bootstrap.Toast.getOrCreateInstance(el, {delay: 3000}).show();
}

function appendLine(html) {
  const div = document.createElement('div');
  div.innerHTML = html;
  logOutput.appendChild(div);
  lineCount++;
  if (lineCount > MAX_LINES) {
    logOutput.removeChild(logOutput.firstChild);
    lineCount--;
  }
  if (autoScroll.checked) logOutput.scrollTop = logOutput.scrollHeight;
}

function classifyLine(type, msg) {
  if (type === 'Error' || type === 'Exception' || type === 'Assert') return 'log-err';
  if (type === 'Warning')                                              return 'log-wrn';
  if (/Chat \(from/.test(msg))                                         return 'log-chat';
  return 'log-inf';
}

function escape(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function connect() {
  statusDot.className = 'status-dot connecting';
  statusText.textContent = 'Connecting…';

  const es = new EventSource('/api/log-stream');
  es.onopen = () => {
    statusDot.className = 'status-dot connected';
    statusText.textContent = 'Connected';
  };
  // v3.0 sends named event "logLine", not the default "message"
  es.addEventListener('logLine', (e) => {
    if (!e.data) return;
    let msg = e.data, type = 'Log';
    try {
      const obj = JSON.parse(e.data);
      msg  = obj.msg  || e.data;
      type = obj.type || 'Log';
    } catch {}
    const ts = new Date().toTimeString().slice(0,8);
    const cls = classifyLine(type, msg);
    appendLine(`<span class="log-inf" style="color:#2d3f57">${ts}</span> <span class="${cls}">${escape(msg)}</span>`);
  });
  es.onerror = () => {
    statusDot.className = 'status-dot disconnected';
    statusText.textContent = 'Disconnected — reconnecting…';
    es.close();
    setTimeout(connect, 5000);
  };
}

document.getElementById('clearBtn').addEventListener('click', () => {
  logOutput.innerHTML = '';
  lineCount = 0;
});

document.getElementById('cmdForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const input = document.getElementById('cmdInput');
  const cmd = input.value.trim();
  if (!cmd) return;
  input.value = '';
  appendLine(`<span style="color:#7986cb">&gt; ${escape(cmd)}</span>`);
  try {
    const r = await fetch('/api/run-command', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({command: cmd}),
    });
    const data = await r.json();
    if (data.error) toast(data.error, false);
  } catch (err) {
    toast(err.message, false);
  }
});

connect();
</script>
</body>
</html>
