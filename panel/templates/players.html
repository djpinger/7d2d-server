<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>7D2D Panel — Players</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/darkly/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    html, body { background-color: #1a1a2e; }
    .app-navbar {
      background-color: #111827;
      border-bottom: 2px solid #c0392b;
      padding: 0.5rem 1.25rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .navbar-brand-text { font-size: 1.15rem; font-weight: 700; color: #fff; letter-spacing: 0.03em; }
    .navbar-brand-text span { color: #e63946; }
    .navbar-meta { font-size: 0.8rem; color: #6c757d; margin-left: 0.75rem; }
    .content-area { padding: 1.5rem 2rem; max-width: 1400px; }
    .table { color: #e9ecef; }
    .table thead th { color: #adb5bd; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; border-color: #2d3f57; }
    .table td { border-color: #2d3f57; vertical-align: middle; font-size: 0.88rem; }
    .table tbody tr:hover { background-color: #1f2b3e; }
    .modal-content { background-color: #1f2b3e; border-color: #2d3f57; }
    .modal-header, .modal-footer { border-color: #2d3f57; }
    .form-control { background-color: #253347; border-color: #3a5068; color: #e9ecef; }
    .form-control:focus { background-color: #253347; border-color: #e63946; color: #e9ecef; box-shadow: none; }
    .toast-container { z-index: 9999; }
    .empty-state { color: #4a6080; font-size: 0.9rem; text-align: center; padding: 3rem 0; }
    .coord-cell { font-family: monospace; font-size: 0.82rem; color: #adb5bd; }
    .btn-xs { padding: 0.15rem 0.45rem; font-size: 0.78rem; }

    /* ── Inventory panel ── */
    .inv-row td { padding: 0 !important; border-top: none !important; background: #131c2e; }
    .inv-panel { padding: 0.75rem 1.25rem 1rem; }
    .inv-section-label {
      font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em;
      color: #6c757d; margin-bottom: 0.4rem; margin-top: 0.6rem;
    }
    .inv-grid { display: flex; flex-wrap: wrap; gap: 3px; }
    .inv-equip-grid { display: grid; grid-template-columns: repeat(2, 44px); gap: 3px; }
    .inv-slot {
      width: 44px; height: 44px;
      background: #1e2d42; border: 2px solid #2d3f57;
      border-radius: 4px; position: relative; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      cursor: default;
    }
    .inv-slot img { width: 36px; height: 36px; object-fit: contain; image-rendering: pixelated; }
    .inv-slot.inv-empty { opacity: 0.35; }
    .inv-slot .inv-count {
      position: absolute; bottom: 1px; right: 3px;
      font-size: 0.65rem; font-weight: 700; color: #fff;
      text-shadow: 0 0 3px #000, 0 0 3px #000;
      line-height: 1;
    }
    .inv-slot .inv-quality {
      position: absolute; top: 1px; left: 2px;
      width: 6px; height: 6px; border-radius: 50%;
    }
    .inv-loading { color: #6c757d; font-size: 0.82rem; padding: 0.75rem 0; }
    .inv-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.25rem; }
    .inv-player-name { font-size: 0.85rem; font-weight: 600; color: #e9ecef; }
    .inv-refresh { font-size: 0.75rem; }
  </style>
</head>
<body>

<div class="app-navbar">
  <div class="d-flex align-items-center">
    <span class="navbar-brand-text"><span>7D2D</span> Panel</span>
    <span class="navbar-meta">{{ server_name }}</span>
  </div>
  <div class="d-flex align-items-center gap-2">
    <a href="/dashboard" class="btn btn-sm btn-outline-secondary"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a>
    <a href="/config"   class="btn btn-sm btn-outline-secondary"><i class="bi bi-sliders me-1"></i>Config</a>
    <a href="/saves"    class="btn btn-sm btn-outline-secondary"><i class="bi bi-hdd me-1"></i>Saves</a>
    <a href="/admin"    class="btn btn-sm btn-outline-secondary"><i class="bi bi-shield-lock me-1"></i>Admin</a>
    <a href="/sandbox"  class="btn btn-sm btn-outline-secondary"><i class="bi bi-code-square me-1"></i>Sandbox</a>
    <a href="/console"  class="btn btn-sm btn-outline-secondary"><i class="bi bi-terminal me-1"></i>Console</a>
    <a href="/players"  class="btn btn-sm btn-danger"><i class="bi bi-people me-1"></i>Players</a>
    <a href="/give"     class="btn btn-sm btn-outline-secondary"><i class="bi bi-box-seam me-1"></i>Give</a>
    <a href="/teleport" class="btn btn-sm btn-outline-secondary"><i class="bi bi-geo-alt me-1"></i>Teleport</a>
    <a href="/mods"     class="btn btn-sm btn-outline-secondary"><i class="bi bi-file-earmark-zip me-1"></i>Mods</a>
    <a href="/logout"   class="btn btn-sm btn-outline-danger ms-1"><i class="bi bi-box-arrow-right me-1"></i>Logout</a>
  </div>
</div>
{% include '_api_warning.html' %}

<div class="content-area">
  <div class="d-flex align-items-center justify-content-between mb-3">
    <h5 class="mb-0" style="color:#e9ecef">
      <i class="bi bi-people me-2" style="color:#e63946"></i>Online Players
      <span id="playerCount" class="badge bg-secondary ms-2">—</span>
    </h5>
    <button class="btn btn-sm btn-outline-secondary" id="refreshBtn">
      <i class="bi bi-arrow-clockwise me-1"></i>Refresh
    </button>
  </div>

  <div class="toast-container position-fixed top-0 end-0 p-3">
    <div id="mainToast" class="toast" role="alert">
      <div class="d-flex">
        <div class="toast-body" id="toastMsg"></div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
      </div>
    </div>
  </div>

  <div id="playerTableWrap">
    <div class="empty-state"><i class="bi bi-hourglass-split d-block fs-2 mb-2"></i>Loading players…</div>
  </div>
</div>

<!-- PM Modal -->
<div class="modal fade" id="pmModal" tabindex="-1">
  <div class="modal-dialog modal-sm">
    <div class="modal-content">
      <div class="modal-header"><h6 class="modal-title">Send Private Message</h6></div>
      <div class="modal-body">
        <input type="hidden" id="pmEntityId">
        <label class="form-label text-secondary" style="font-size:0.82rem">To: <strong id="pmPlayerName"></strong></label>
        <input type="text" id="pmMessage" class="form-control mt-1" placeholder="Your message…">
      </div>
      <div class="modal-footer">
        <button class="btn btn-sm btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-sm btn-danger" id="pmSendBtn">Send</button>
      </div>
    </div>
  </div>
</div>

<!-- Ban Modal -->
<div class="modal fade" id="banModal" tabindex="-1">
  <div class="modal-dialog modal-sm">
    <div class="modal-content">
      <div class="modal-header"><h6 class="modal-title text-danger">Ban Player</h6></div>
      <div class="modal-body">
        <input type="hidden" id="banEntityId">
        <label class="form-label text-secondary" style="font-size:0.82rem">Player: <strong id="banPlayerName"></strong></label>
        <input type="text" id="banDuration" class="form-control mt-1 mb-2" placeholder="Duration (e.g. 1 day, 1 week, perm)">
        <input type="text" id="banReason" class="form-control" placeholder="Reason">
      </div>
      <div class="modal-footer">
        <button class="btn btn-sm btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-sm btn-danger" id="banConfirmBtn">Ban</button>
      </div>
    </div>
  </div>
</div>

<!-- Permission Modal -->
<div class="modal fade" id="permModal" tabindex="-1">
  <div class="modal-dialog modal-sm">
    <div class="modal-content">
      <div class="modal-header"><h6 class="modal-title"><i class="bi bi-shield me-2"></i>Set Permission</h6></div>
      <div class="modal-body">
        <input type="hidden" id="permPlatform">
        <input type="hidden" id="permUserId">
        <label class="form-label text-secondary" style="font-size:0.82rem">Player: <strong id="permPlayerName"></strong></label>
        <select id="permLevel" class="form-select mt-2">
          <option value="0">0 — Admin (full access)</option>
          <option value="100">100 — Moderator</option>
          <option value="1000" selected>1000 — Player (default)</option>
        </select>
        <div class="form-text mt-1">Setting to 1000 removes admin/mod rights.</div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-sm btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-sm btn-danger" id="permRemoveBtn">Remove</button>
        <button class="btn btn-sm btn-info" id="permSaveBtn">Save</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
function toast(msg, ok=true) {
  const el = document.getElementById('mainToast');
  document.getElementById('toastMsg').textContent = msg;
  el.className = `toast text-bg-${ok ? 'success' : 'danger'}`;
  bootstrap.Toast.getOrCreateInstance(el, {delay: 3500}).show();
}

async function runCommand(cmd) {
  const r = await fetch('/api/run-command', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({command: cmd}),
  });
  return r.json();
}

// ── Inventory rendering ──────────────────────────────────────────────────────

function itemSlot(item, title) {
  if (!item) return `<div class="inv-slot inv-empty" title="${title || 'Empty'}"></div>`;
  const iconUrl = `/api/itemicon/${item.icon}/${item.iconcolor || 'FFFFFF'}`;
  const qDot = item.quality > 0
    ? `<span class="inv-quality" style="background:#${item.qualitycolor || 'aaa'}"></span>`
    : '';
  const count = item.count > 1 ? `<span class="inv-count">${item.count}</span>` : '';
  const label = title || item.name;
  return `<div class="inv-slot" title="${label}" style="${item.quality > 0 ? `border-color:#${item.qualitycolor}` : ''}">
    ${qDot}
    <img src="${iconUrl}" alt="${item.name}" loading="lazy" onerror="this.style.display='none'">
    ${count}
  </div>`;
}

function renderInventory(data, steamId) {
  const eq = data.equipment || {};
  const equipSlots = [
    { key: 'head',   label: 'Head'   },
    { key: 'gloves', label: 'Gloves' },
    { key: 'armor',  label: 'Armor'  },
    { key: 'boots',  label: 'Boots'  },
  ];
  const equipHtml = `<div class="inv-equip-grid">
    ${equipSlots.map(s => itemSlot(eq[s.key] || null, s.label)).join('')}
  </div>`;

  const belt = data.belt || [];
  const beltHtml = `<div class="inv-grid">
    ${belt.map((it, i) => itemSlot(it, `Belt ${i}`)).join('')}
  </div>`;

  const bag = data.bag || [];
  const rows = [];
  for (let r = 0; r < Math.ceil(bag.length / 9); r++) {
    const slice = bag.slice(r * 9, r * 9 + 9);
    rows.push(`<div class="inv-grid">${slice.map((it, i) => itemSlot(it, `Bag ${r*9+i}`)).join('')}</div>`);
  }

  return `<div class="inv-panel">
    <div class="inv-header">
      <span class="inv-player-name"><i class="bi bi-backpack me-1"></i>${data.playername}</span>
      <button class="btn btn-xs btn-outline-secondary inv-refresh" onclick="loadInventory('${steamId}')">
        <i class="bi bi-arrow-clockwise me-1"></i>Refresh
      </button>
    </div>
    <div class="d-flex gap-4 flex-wrap">
      <div>
        <div class="inv-section-label">Equipped</div>
        ${equipHtml}
      </div>
      <div>
        <div class="inv-section-label">Belt</div>
        ${beltHtml}
      </div>
    </div>
    <div class="inv-section-label mt-2">Bag</div>
    ${rows.join('')}
  </div>`;
}

function getInvRow(steamId) {
  return document.getElementById(`inv-${steamId.replace(/[^a-z0-9]/gi, '_')}`);
}

async function loadInventory(steamId) {
  const row = getInvRow(steamId);
  if (!row) return;
  const td = row.querySelector('td');
  td.innerHTML = '<div class="inv-loading ps-3"><i class="bi bi-hourglass-split me-1"></i>Loading inventory…</div>';
  try {
    const r = await fetch(`/api/inventory/${encodeURIComponent(steamId)}`);
    const data = await r.json();
    if (data.error) {
      td.innerHTML = `<div class="inv-loading text-danger ps-3"><i class="bi bi-exclamation-triangle me-1"></i>${data.error}</div>`;
    } else {
      td.innerHTML = renderInventory(data, steamId);
    }
  } catch(e) {
    td.innerHTML = `<div class="inv-loading text-danger ps-3"><i class="bi bi-exclamation-triangle me-1"></i>Failed to load inventory</div>`;
  }
}

function toggleInventory(steamId) {
  const row = getInvRow(steamId);
  if (!row) return;
  const isHidden = row.style.display === 'none' || !row.style.display;
  if (isHidden) {
    row.style.display = '';
    const td = row.querySelector('td');
    if (!td.dataset.loaded) {
      td.dataset.loaded = '1';
      loadInventory(steamId);
    }
  } else {
    row.style.display = 'none';
  }
}

// ── Player table ─────────────────────────────────────────────────────────────

function buildTable(players, permMap) {
  if (!players.length) return '<div class="empty-state"><i class="bi bi-person-x d-block fs-2 mb-2"></i>No players online</div>';

  const rows = players.map(p => {
    const uid   = p.platformId || {};
    const sid   = uid.combinedString || '';
    const safeId = sid.replace(/[^a-z0-9]/gi, '_');
    const pos   = p.position || {};
    const kills = p.kills || {};
    const posStr = [pos.x, pos.y, pos.z].map(v => v != null ? Math.round(v) : '—').join(', ');
    const nameSafe = (p.name || '').replace(/'/g, "\\'");

    const userId  = (p.platformId || {}).userId || '';
    const perm    = permMap[userId] ?? 1000;
    const permBadge = perm === 0   ? `<span class="badge bg-danger">Admin</span>`
                    : perm === 100 ? `<span class="badge bg-warning text-dark">Mod</span>`
                    : perm < 1000  ? `<span class="badge bg-secondary">${perm}</span>`
                    :                `<span class="text-muted" style="font-size:0.8rem">Player</span>`;

    return `<tr>
      <td><strong>${p.name || '—'}</strong><br><small class="text-muted">${sid}</small></td>
      <td class="coord-cell">${posStr}</td>
      <td>${p.health ?? '—'}</td>
      <td>${p.level ?? '—'}</td>
      <td>${kills.zombies ?? '—'}</td>
      <td>${p.deaths ?? '—'}</td>
      <td>${p.score ?? '—'}</td>
      <td>${p.ping ?? '—'}</td>
      <td>${permBadge}</td>
      <td>
        <div class="d-flex gap-1">
          <button class="btn btn-xs btn-outline-info" title="Inventory" onclick="toggleInventory('${sid}')">
            <i class="bi bi-backpack"></i>
          </button>
          <button class="btn btn-xs btn-outline-primary" title="PM" onclick="openPm(${p.entityId}, '${nameSafe}')">
            <i class="bi bi-chat-dots"></i>
          </button>
          <a href="/give?entityId=${p.entityId}&name=${encodeURIComponent(p.name||'')}" class="btn btn-xs btn-outline-success" title="Give item">
            <i class="bi bi-box-seam"></i>
          </a>
          <button class="btn btn-xs btn-outline-warning" title="Kick" onclick="kickPlayer(${p.entityId}, '${nameSafe}')">
            <i class="bi bi-door-open"></i>
          </button>
          <button class="btn btn-xs btn-outline-danger" title="Ban" onclick="openBan(${p.entityId}, '${nameSafe}')">
            <i class="bi bi-slash-circle"></i>
          </button>
          <button class="btn btn-xs btn-outline-info" title="Set permission" onclick="openPerm('${(p.platformId||{}).platformId||'Steam'}','${userId}','${nameSafe}',${perm})">
            <i class="bi bi-shield"></i>
          </button>
        </div>
      </td>
    </tr>
    <tr class="inv-row" id="inv-${safeId}" style="display:none">
      <td colspan="10"></td>
    </tr>`;
  }).join('');

  return `<table class="table table-sm">
    <thead><tr>
      <th>Player</th><th>Position</th><th>HP</th><th>Lvl</th><th>Zk</th><th>Deaths</th><th>Score</th><th>Ping</th><th>Perm</th><th>Actions</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

async function loadPlayers() {
  try {
    const [playersR, adminR] = await Promise.all([fetch('/api/players'), fetch('/api/admin')]);
    const playersJson = await playersR.json();
    const adminJson   = await adminR.json();
    const players = (playersJson.data && playersJson.data.players) || [];
    const permMap = {};
    (adminJson.users || []).forEach(u => { permMap[u.userid] = parseInt(u.permission_level); });
    document.getElementById('playerCount').textContent = players.length;
    document.getElementById('playerTableWrap').innerHTML = buildTable(players, permMap);
  } catch(e) {
    document.getElementById('playerTableWrap').innerHTML =
      '<div class="empty-state text-danger"><i class="bi bi-exclamation-triangle me-1"></i>Failed to load players</div>';
  }
}

function openPm(entityId, name) {
  document.getElementById('pmEntityId').value = entityId;
  document.getElementById('pmPlayerName').textContent = name;
  document.getElementById('pmMessage').value = '';
  bootstrap.Modal.getOrCreateInstance(document.getElementById('pmModal')).show();
}

function openBan(entityId, name) {
  document.getElementById('banEntityId').value = entityId;
  document.getElementById('banPlayerName').textContent = name;
  document.getElementById('banDuration').value = '';
  document.getElementById('banReason').value = '';
  bootstrap.Modal.getOrCreateInstance(document.getElementById('banModal')).show();
}

async function kickPlayer(entityId, name) {
  if (!confirm(`Kick ${name}?`)) return;
  const r = await runCommand(`kick ${entityId} Kicked by admin`);
  toast(r.error ? r.error : `${name} kicked`, !r.error);
  if (!r.error) loadPlayers();
}

document.getElementById('pmSendBtn').addEventListener('click', async () => {
  const eid = document.getElementById('pmEntityId').value;
  const msg = document.getElementById('pmMessage').value.trim();
  if (!msg) return;
  bootstrap.Modal.getOrCreateInstance(document.getElementById('pmModal')).hide();
  const r = await runCommand(`sayplayer ${eid} ${msg}`);
  toast(r.error ? r.error : 'Message sent', !r.error);
});

document.getElementById('banConfirmBtn').addEventListener('click', async () => {
  const eid    = document.getElementById('banEntityId').value;
  const dur    = document.getElementById('banDuration').value.trim() || '1 day';
  const reason = document.getElementById('banReason').value.trim()   || 'Banned by admin';
  const name   = document.getElementById('banPlayerName').textContent;
  bootstrap.Modal.getOrCreateInstance(document.getElementById('banModal')).hide();
  const r = await runCommand(`ban add ${eid} ${dur} ${reason}`);
  toast(r.error ? r.error : `${name} banned`, !r.error);
  if (!r.error) loadPlayers();
});

document.getElementById('refreshBtn').addEventListener('click', loadPlayers);

function openPerm(platform, userId, name, currentLevel) {
  document.getElementById('permPlatform').value = platform;
  document.getElementById('permUserId').value = userId;
  document.getElementById('permPlayerName').textContent = name;
  const level = currentLevel ?? 1000;
  const sel = document.getElementById('permLevel');
  sel.value = String(level);
  if (!sel.value) sel.value = '1000';
  bootstrap.Modal.getOrCreateInstance(document.getElementById('permModal')).show();
}

document.getElementById('permSaveBtn').addEventListener('click', async () => {
  const platform = document.getElementById('permPlatform').value;
  const userId   = document.getElementById('permUserId').value;
  const name     = document.getElementById('permPlayerName').textContent;
  const level    = parseInt(document.getElementById('permLevel').value);
  bootstrap.Modal.getOrCreateInstance(document.getElementById('permModal')).hide();

  await fetch('/api/admin/users', {
    method: 'DELETE', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({userid: userId}),
  }).catch(() => {});

  if (level < 1000) {
    const r = await fetch('/api/admin/users', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({platform, userid: userId, name, permission_level: String(level)}),
    });
    const json = await r.json();
    toast(json.error ? json.error : `${name} set to permission level ${level}`, !json.error);
  } else {
    toast(`${name} reverted to default player (1000)`);
  }
});

document.getElementById('permRemoveBtn').addEventListener('click', async () => {
  const userId = document.getElementById('permUserId').value;
  const name   = document.getElementById('permPlayerName').textContent;
  bootstrap.Modal.getOrCreateInstance(document.getElementById('permModal')).hide();
  const r = await fetch('/api/admin/users', {
    method: 'DELETE', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({userid: userId}),
  });
  const json = await r.json();
  if (json.error && json.error !== 'Entry not found') toast(json.error, false);
  else toast(`${name} removed from admin list`);
});

loadPlayers();
setInterval(loadPlayers, 30000);
</script>
</body>
</html>
