<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>7D2D Panel — Sandbox Generator</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/darkly/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    html, body { height: 100%; overflow: hidden; background-color: #1a1a2e; }
    .app-shell { display: flex; flex-direction: column; height: 100vh; }

    /* ── Navbar ─────────────────────────────── */
    .app-navbar {
      background-color: #111827;
      border-bottom: 2px solid #c0392b;
      padding: 0.5rem 1.25rem;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .navbar-brand-text { font-size: 1.15rem; font-weight: 700; color: #fff; letter-spacing: 0.03em; }
    .navbar-brand-text span { color: #e63946; }
    .navbar-meta { font-size: 0.8rem; color: #6c757d; margin-left: 0.75rem; }

    /* ── Code panel ─────────────────────────── */
    .code-panel {
      background-color: #111827;
      border-bottom: 1px solid #2d3f57;
      padding: 0.6rem 1.25rem;
      flex-shrink: 0;
    }
    .code-output {
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      background-color: #0d1117;
      border: 1px solid #3a5068;
      color: #58c4dc;
      border-radius: 6px;
      padding: 0.35rem 0.65rem;
      flex: 1;
      word-break: break-all;
      min-height: 2.1rem;
      letter-spacing: 0.04em;
    }
    .code-badge {
      font-size: 0.73rem; background: #253347; color: #adb5bd;
      border-radius: 4px; padding: 2px 7px; white-space: nowrap;
    }
    .code-badge.has-changes { background: #2d2003; color: #f39c12; }
    .import-input {
      background-color: #253347 !important; border-color: #3a5068 !important;
      color: #e9ecef !important; font-family: monospace; font-size: 0.85rem;
    }
    .import-input:focus {
      border-color: #e63946 !important;
      box-shadow: 0 0 0 0.15rem rgba(230,57,70,0.25) !important;
    }

    /* ── Content area (scrollable) ──────────── */
    .content-area { flex: 1; overflow-y: auto; padding: 0 1.5rem 2rem; background-color: #1a1a2e; }

    /* ── Category tabs (sticky inside scroll) ── */
    .category-tabs {
      position: sticky; top: 0; z-index: 99;
      background-color: #1a1a2e;
      padding-top: 0.6rem;
      border-bottom: 1px solid #2d3f57;
      margin-bottom: 1rem;
    }
    .nav-tabs { border-bottom: none; flex-wrap: wrap; gap: 2px; }
    .nav-tabs .nav-link {
      color: #adb5bd; border: none; border-radius: 5px 5px 0 0;
      font-size: 0.82rem; padding: 0.35rem 0.8rem; white-space: nowrap;
    }
    .nav-tabs .nav-link:hover { color: #f8f9fa; background: #1f2b3e; }
    .nav-tabs .nav-link.active { background-color: #1f2b3e; color: #fff; border-bottom: 2px solid #e63946; }
    .tab-badge {
      font-size: 0.68rem; background: #f39c12; color: #000;
      border-radius: 10px; padding: 1px 5px; margin-left: 3px;
    }

    /* ── Groups ─────────────────────────────── */
    .groups-wrapper { max-width: 860px; }
    .group-section { margin-bottom: 1.25rem; }
    .group-header {
      font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.09em; color: #5a7a9a;
      padding-bottom: 0.3rem; margin-bottom: 0.5rem;
      border-bottom: 1px solid #2d3f57;
    }

    /* ── Options grid (2-column) ─────────────── */
    .options-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.5rem;
    }
    .option-row {
      background-color: #1f2b3e;
      border: 1px solid #2d3f57;
      border-radius: 7px;
      padding: 0.5rem 0.75rem;
      display: flex; align-items: center; gap: 0.5rem;
      transition: border-color 0.15s, opacity 0.15s;
      min-width: 0;
    }
    .option-row.non-default { border-color: #f39c12; }
    .option-row.opt-disabled { opacity: 0.35; pointer-events: none; }
    .option-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #2d3f57; flex-shrink: 0; transition: background 0.15s;
    }
    .option-row.non-default .option-dot { background: #f39c12; }
    .option-label {
      flex: 1; font-size: 0.81rem; font-weight: 500; color: #cdd3db;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      min-width: 0;
    }
    .option-control { flex-shrink: 0; display: flex; align-items: center; gap: 0.35rem; }
    .option-control .form-select {
      background-color: #253347; border-color: #3a5068;
      color: #e9ecef; font-size: 0.8rem;
      padding: 0.2rem 1.6rem 0.2rem 0.45rem;
      width: 130px;
    }
    .option-control .form-select:focus {
      border-color: #e63946; box-shadow: 0 0 0 0.15rem rgba(230,57,70,0.25);
      background-color: #253347; color: #e9ecef;
    }
    .option-control .form-check-input:checked { background-color: #e63946; border-color: #e63946; }
    .bool-default { font-size: 0.7rem; color: #5a7a9a; white-space: nowrap; }

    /* ── Per-option reset button ─────────────── */
    .opt-reset {
      flex-shrink: 0; background: none; border: none;
      color: #5a7a9a; font-size: 0.8rem; padding: 0 2px;
      cursor: pointer; opacity: 0; pointer-events: none;
      transition: color 0.15s, opacity 0.15s;
      line-height: 1;
    }
    .opt-reset:hover { color: #f39c12; }
    .option-row.non-default .opt-reset { opacity: 1; pointer-events: auto; }

    /* ── Toast ──────────────────────────────── */
    .toast-container { z-index: 9999; }
  </style>
</head>
<body>
<div class="app-shell">

  <!-- Navbar -->
  <div class="app-navbar">
    <div class="d-flex align-items-center">
      <span class="navbar-brand-text"><span>7D2D</span> Panel</span>
      <span class="navbar-meta">{{ server_name }}</span>
    </div>
    <div class="d-flex align-items-center gap-2">
      <a href="/dashboard" class="btn btn-sm btn-outline-secondary"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a>
    <a href="/config" class="btn btn-sm btn-outline-secondary"><i class="bi bi-sliders me-1"></i>Config</a>
      <a href="/saves" class="btn btn-sm btn-outline-secondary"><i class="bi bi-hdd me-1"></i>Saves</a>
      <a href="/admin" class="btn btn-sm btn-outline-secondary"><i class="bi bi-shield-lock me-1"></i>Admin</a>
      <a href="/sandbox" class="btn btn-sm btn-danger"><i class="bi bi-code-square me-1"></i>Sandbox</a>
      <a href="/console" class="btn btn-sm btn-outline-secondary"><i class="bi bi-terminal me-1"></i>Console</a>
      <a href="/players" class="btn btn-sm btn-outline-secondary"><i class="bi bi-people me-1"></i>Players</a>
      <a href="/give" class="btn btn-sm btn-outline-secondary"><i class="bi bi-box-seam me-1"></i>Give</a>
      <a href="/teleport" class="btn btn-sm btn-outline-secondary"><i class="bi bi-geo-alt me-1"></i>Teleport</a>
      <a href="/mods" class="btn btn-sm btn-outline-secondary"><i class="bi bi-file-earmark-zip me-1"></i>Mods</a>
      <a href="/logout" class="btn btn-sm btn-outline-danger ms-1"><i class="bi bi-box-arrow-right me-1"></i>Logout</a>
    </div>
  </div>
  {% include '_api_warning.html' %}

  <!-- Code Panel -->
  <div class="code-panel">
    <div class="d-flex align-items-center gap-2 mb-2">
      <span class="text-muted" style="font-size:0.78rem;white-space:nowrap;">Generated Code</span>
      <div class="code-output" id="codeOutput">A</div>
      <span class="code-badge" id="changeBadge">All defaults</span>
      <button class="btn btn-sm btn-outline-info" onclick="copyCode()" title="Copy to clipboard">
        <i class="bi bi-clipboard"></i>
      </button>
      <button class="btn btn-sm btn-outline-success" onclick="applyToConfig()" title="Write this SandboxCode to server config">
        <i class="bi bi-floppy me-1"></i>Apply to Config
      </button>
      <button class="btn btn-sm btn-outline-info" onclick="loadFromConfig()" title="Load current SandboxCode from server config">
        <i class="bi bi-cloud-download me-1"></i>Load from Config
      </button>
      <button class="btn btn-sm btn-outline-warning" onclick="resetAll()" title="Reset all settings to game defaults">
        <i class="bi bi-arrow-counterclockwise me-1"></i>Reset to Defaults
      </button>
    </div>
    <div class="d-flex align-items-center gap-2">
      <span class="text-muted" style="font-size:0.78rem;white-space:nowrap;">Import Code</span>
      <input type="text" id="importInput" class="form-control form-control-sm import-input"
             placeholder="Paste a SandboxCode to decode it…" style="max-width:360px;">
      <button class="btn btn-sm btn-outline-primary" onclick="importCode()">
        <i class="bi bi-box-arrow-in-down me-1"></i>Decode
      </button>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast-container position-fixed top-0 end-0 p-3">
    <div id="mainToast" class="toast" role="alert" aria-live="assertive">
      <div class="d-flex">
        <div class="toast-body" id="toastMsg"></div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
      </div>
    </div>
  </div>

  <!-- Content -->
  <div class="content-area">
    <div class="category-tabs">
      <ul class="nav nav-tabs" id="categoryTabs"></ul>
    </div>
    <div class="tab-content" id="tabContent"></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  {id:'SillyCelebrate',    enumId:146,label:'Celebrate Kills',          cat:'Misc',   group:'Silly',            type:'int',   def:0,  vals:[0,1,2],           labels:['Off','Player Kills','All Kills']},
  {id:'SillyBigHeads',     enumId:147,label:'Big Heads',                cat:'Misc',   group:'Silly',            type:'bool',  def:0,  vals:[false,true]},
  {id:'SillyTinyZombies',  enumId:148,label:'Tiny Zombies',             cat:'Misc',   group:'Silly',            type:'bool',  def:0,  vals:[false,true]},
  {id:'SillySounds',       enumId:149,label:'Silly Sounds',             cat:'Misc',   group:'Silly',            type:'bool',  def:0,  vals:[false,true]},
  {id:'SillyLowGravity',   enumId:150,label:'Gravity',                  cat:'Misc',   group:'Silly',            type:'float', def:5,  vals:[0.5,0.6,0.7,0.8,0.9,1],                                  labels:['50%','60%','70%','80%','90%','100%']},
  {id:'SillyBlackandWhite',enumId:151,label:'Black and White',          cat:'Misc',   group:'Silly',            type:'bool',  def:0,  vals:[false,true]},

const DISABLE_RULES = {
  StaminaUsage:       {vi:0, disables:['StaminaRegen']},
  BloodMoonFrequency: {vi:0, disables:['BloodMoonRange','BloodMoonEnemyCount','BloodMoonWarning']},
  AirDropFrequency:   {vi:0, disables:['AirDropRandomTime','AirDropMarker']},
  StormFreq:          {vi:0, disables:['StormWarning']},
  GlobalLootCount:    {vi:0, disables:['FoodLootCount','DrinkLootCount','MedicalLootCount','AmmoLootCount',
                         'ResourceLootCount','ArmorLootCount','MeleeLootCount','RangedLootCount',
                         'DukesLootCount','CraftingMagazinesLootCount','TreasureMapChance']},
  SkillGainRate:      {vi:0, disables:['SkillPointsPerLevel']},
};

const CATEGORIES = ['Player','Entities','World','Resources','Crafting','Tasks','Traders','Misc'];

// ── State ─────────────────────────────────────────────────────────────────────
const state = {};
function initState() { OPTIONS.forEach(o => { state[o.id] = o.def; }); }

// ── Encode / Decode ───────────────────────────────────────────────────────────
function encode() {
  const sorted = [...OPTIONS].sort((a,b) => a.enumId - b.enumId);
  let r = 'A';
  for (const o of sorted) {
    if (state[o.id] !== o.def) {
      r += String.fromCharCode(65 + Math.floor(o.enumId / 26));
      r += String.fromCharCode(65 + (o.enumId % 26));
      r += String.fromCharCode(65 + state[o.id]);
    }
  }
  return r;
}

function decode(code) {
  const c = (code || '').trim().toUpperCase();
  if (!c.startsWith('A')) return null;
  const byId = {};
  OPTIONS.forEach(o => { byId[o.enumId] = o; });
  const s = {};
  OPTIONS.forEach(o => { s[o.id] = o.def; });
  for (let i = 1; i + 2 <= c.length; i += 3) {
    const eid = (c.charCodeAt(i) - 65) * 26 + (c.charCodeAt(i+1) - 65);
    const vi  = c.charCodeAt(i+2) - 65;
    const o   = byId[eid];
    if (o && vi >= 0 && vi < o.vals.length) s[o.id] = vi;
  }
  return s;
}

// ── UI Build ──────────────────────────────────────────────────────────────────
function buildUI() {
  const tabsEl    = document.getElementById('categoryTabs');
  const contentEl = document.getElementById('tabContent');

  CATEGORIES.forEach((cat, idx) => {
    // Tab button
    const li  = document.createElement('li');
    li.className = 'nav-item';
    const btn = document.createElement('button');
    btn.className    = 'nav-link' + (idx === 0 ? ' active' : '');
    btn.id           = 'tab-btn-' + cat;
    btn.dataset.bsToggle  = 'tab';
    btn.dataset.bsTarget  = '#tab-' + cat;
    btn.type         = 'button';
    btn.innerHTML    = cat + '<span class="tab-badge d-none" id="badge-' + cat + '">0</span>';
    li.appendChild(btn);
    tabsEl.appendChild(li);

    // Tab pane
    const pane = document.createElement('div');
    pane.className = 'tab-pane fade' + (idx === 0 ? ' show active' : '');
    pane.id = 'tab-' + cat;

    const wrapper = document.createElement('div');
    wrapper.className = 'groups-wrapper';

    // Collect ordered groups for this category
    const catOpts = OPTIONS.filter(o => o.cat === cat);
    const seenGroups = [];
    catOpts.forEach(o => { if (!seenGroups.includes(o.group)) seenGroups.push(o.group); });

    seenGroups.forEach(grp => {
      const section = document.createElement('div');
      section.className = 'group-section';

      const header = document.createElement('div');
      header.className = 'group-header';
      header.textContent = grp;
      section.appendChild(header);

      const grid = document.createElement('div');
      grid.className = 'options-grid';
      catOpts.filter(o => o.group === grp).forEach(opt => {
        grid.appendChild(createRow(opt));
      });
      section.appendChild(grid);
      wrapper.appendChild(section);
    });

    pane.appendChild(wrapper);
    contentEl.appendChild(pane);
  });
}

function createRow(opt) {
  const row = document.createElement('div');
  row.className = 'option-row';
  row.id = 'row-' + opt.id;

  const dot = document.createElement('span');
  dot.className = 'option-dot';
  dot.id = 'dot-' + opt.id;
  row.appendChild(dot);

  const label = document.createElement('span');
  label.className = 'option-label';
  label.textContent = opt.label;
  label.title = opt.id;
  row.appendChild(label);

  // Per-option reset button
  const resetBtn = document.createElement('button');
  resetBtn.className = 'opt-reset';
  resetBtn.title = 'Reset to default';
  resetBtn.innerHTML = '&#8635;';
  resetBtn.addEventListener('click', () => {
    state[opt.id] = opt.def;
    syncOne(opt);
    refresh();
  });
  row.appendChild(resetBtn);

  const ctrl = document.createElement('div');
  ctrl.className = 'option-control';

  if (opt.type === 'bool') {
    const sw  = document.createElement('div');
    sw.className = 'form-check form-switch mb-0';
    const inp = document.createElement('input');
    inp.type = 'checkbox'; inp.className = 'form-check-input'; inp.role = 'switch';
    inp.id = 'opt-' + opt.id;
    inp.checked = state[opt.id] === 1;
    inp.addEventListener('change', () => { state[opt.id] = inp.checked ? 1 : 0; refresh(); });
    sw.appendChild(inp);
    ctrl.appendChild(sw);

    const defHint = document.createElement('span');
    defHint.className = 'bool-default';
    defHint.textContent = 'def: ' + (opt.vals[opt.def] ? 'on' : 'off');
    ctrl.appendChild(defHint);
  } else {
    const sel = document.createElement('select');
    sel.className = 'form-select form-select-sm';
    sel.id = 'opt-' + opt.id;
    opt.vals.forEach((v, i) => {
      const o = document.createElement('option');
      o.value = i;
      o.textContent = (opt.labels ? opt.labels[i] : String(v)) + (i === opt.def ? ' ★' : '');
      if (i === state[opt.id]) o.selected = true;
      sel.appendChild(o);
    });
    sel.addEventListener('change', () => { state[opt.id] = parseInt(sel.value, 10); refresh(); });
    ctrl.appendChild(sel);
  }

  row.appendChild(ctrl);
  return row;
}

// ── Sync helpers ──────────────────────────────────────────────────────────────
function syncOne(opt) {
  const el = document.getElementById('opt-' + opt.id);
  if (!el) return;
  if (opt.type === 'bool') el.checked = state[opt.id] === 1;
  else el.value = state[opt.id];
}

function syncAll() { OPTIONS.forEach(syncOne); }

// ── Refresh ───────────────────────────────────────────────────────────────────
function refresh() {
  const code = encode();
  document.getElementById('codeOutput').textContent = code;

  let total = 0;
  CATEGORIES.forEach(cat => {
    const changed = OPTIONS.filter(o => o.cat === cat && state[o.id] !== o.def).length;
    total += changed;
    const badge = document.getElementById('badge-' + cat);
    if (badge) { badge.textContent = changed; badge.classList.toggle('d-none', changed === 0); }
    OPTIONS.filter(o => o.cat === cat).forEach(opt => {
      const row = document.getElementById('row-' + opt.id);
      if (row) row.classList.toggle('non-default', state[opt.id] !== opt.def);
    });
  });

  const badge = document.getElementById('changeBadge');
  if (total > 0) {
    badge.textContent = total + ' custom setting' + (total !== 1 ? 's' : '');
    badge.className = 'code-badge has-changes';
  } else {
    badge.textContent = 'All defaults';
    badge.className = 'code-badge';
  }

  // Disable rules
  for (const [id, rule] of Object.entries(DISABLE_RULES)) {
    const off = state[id] === rule.vi;
    rule.disables.forEach(tid => {
      const row = document.getElementById('row-' + tid);
      if (row) row.classList.toggle('opt-disabled', off);
    });
  }

  history.replaceState(null, '', '#' + code);
}

// ── Actions ───────────────────────────────────────────────────────────────────
function copyCode() {
  const code = document.getElementById('codeOutput').textContent;
  navigator.clipboard.writeText(code)
    .then(() => showToast('Code copied to clipboard.', 'success'))
    .catch(() => showToast('Copy failed — select the code and copy manually.', 'warning'));
}

function importCode() {
  const raw = document.getElementById('importInput').value.trim();
  if (!raw) { showToast('Paste a SandboxCode first.', 'warning'); return; }
  const s = decode(raw);
  if (!s) { showToast('Invalid code — must start with "A".', 'danger'); return; }
  Object.assign(state, s);
  syncAll(); refresh();
  document.getElementById('importInput').value = '';
  showToast('Code decoded — settings updated.', 'success');
}

function resetAll() {
  OPTIONS.forEach(o => { state[o.id] = o.def; });
  syncAll(); refresh();
  showToast('All settings reset to defaults.', 'secondary');
}

function applyToConfig() {
  const code = document.getElementById('codeOutput').textContent;
  fetch('/api/config', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({updates: {SandboxCode: code}}),
  })
    .then(r => r.json())
    .then(d => d.ok ? showToast('SandboxCode saved to server config.', 'success')
                    : showToast('Error: ' + d.error, 'danger'))
    .catch(e => showToast('Network error: ' + e.message, 'danger'));
}

function loadFromConfig() {
  fetch('/api/config')
    .then(r => r.json())
    .then(d => {
      const code = d.SandboxCode || '';
      if (!code) { showToast('No SandboxCode in current config.', 'warning'); return; }
      const s = decode(code);
      if (!s) { showToast('Config SandboxCode is invalid.', 'danger'); return; }
      Object.assign(state, s);
      syncAll(); refresh();
      showToast('Loaded code from server config.', 'success');
    })
    .catch(e => showToast('Network error: ' + e.message, 'danger'));
}

document.getElementById('importInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') importCode();
});

// ── Toast ─────────────────────────────────────────────────────────────────────
function showToast(msg, type) {
  const el = document.getElementById('mainToast');
  el.className = 'toast align-items-center text-bg-' + type + ' border-0';
  document.getElementById('toastMsg').textContent = msg;
  bootstrap.Toast.getOrCreateInstance(el, {delay: 3000}).show();
}

// ── Init ──────────────────────────────────────────────────────────────────────
initState();
buildUI();

const urlHash = location.hash.replace('#', '');
if (urlHash.startsWith('A') && urlHash.length > 1) {
  // URL hash takes priority (shared/bookmarked code)
  const s = decode(urlHash);
  if (s) { Object.assign(state, s); syncAll(); }
  refresh();
} else {
  // Auto-load saved config on every page open
  fetch('/api/config')
    .then(r => r.json())
    .then(d => {
      const s = decode(d.SandboxCode || '');
      if (s) { Object.assign(state, s); syncAll(); }
    })
    .catch(() => {})
    .finally(() => refresh());
}
</script>
