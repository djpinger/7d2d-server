<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>7D2D Panel — Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/darkly/bootstrap.min.css">
  <style>
    html, body { height: 100%; background-color: #1a1a2e; }
    .login-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      width: 100%;
      max-width: 380px;
    }
    .brand-header {
      text-align: center;
      padding: 2rem 0 1.5rem;
    }
    .brand-title {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: #e63946;
    }
    .brand-subtitle {
      color: #adb5bd;
      font-size: 0.9rem;
      margin-top: 0.25rem;
    }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="brand-header">
        <div class="brand-title">7D2D Panel</div>
        <div class="brand-subtitle">Server Administration</div>
      </div>
      <div class="card">
        <div class="card-body p-4">
          <h5 class="card-title mb-4">Sign In</h5>
          {% if error %}
          <div class="alert alert-danger py-2" role="alert">{{ error }}</div>
          {% endif %}
          <form method="POST" action="/login">
            <div class="mb-3">
              <label for="password" class="form-label">Password</label>
              <input
                type="password"
                class="form-control"
                id="password"
                name="password"
                autofocus
                autocomplete="current-password"
                required
              >
            </div>
            <div class="d-grid mt-4">
              <button type="submit" class="btn btn-danger">Login</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
