services:

  # ── Game server ───────────────────────────────────────────────────────────────
  # Lifecycle is managed by the panel (start/stop/restart buttons).
  # restart: "no" — Docker will not auto-restart it; the panel controls it.
  # Rebuild the panel without affecting this container:
  #   docker compose up -d --build 7dtd-panel
  7dtd-game:
    build:
      context: .
      dockerfile: Dockerfile.game
    container_name: 7dtd-game
    environment:
      - PUID=1000
      - PGID=1000
      - SERVERFILES_PATH=/serverfiles
      - CONFIG_PATH=/config/sdtdserver.xml
      - GAMEDATA_PATH=/gamedata
      - LOG_DIR=/logs
    volumes:
      - ./data/serverfiles:/serverfiles
      - ./data/gamedata:/gamedata
      - ./data/config:/config
      - ./data/logs:/logs
    ports:
      - "26900:26900/tcp"
      - "26900:26900/udp"
      - "26901:26901/udp"
      - "26902:26902/udp"
      - "18080:8080"
    restart: "no"

  # ── Web panel ─────────────────────────────────────────────────────────────────
  7dtd-panel:
    build: .
    container_name: 7dtd-panel
    environment:
      - PUID=1000
      - PGID=1000
      - PANEL_PASSWORD=AdminAdmin1
      - SECRET_KEY=SuperSecretKey1
      - GAME_BRANCH=public                   # public | latest_experimental
      - GAME_API_URL=http://7dtd-game:8080   # internal Docker network
      - GAME_API_TOKEN_NAME=csmm
      - GAME_API_SECRET=YourMotherWasAHampster
      - GAME_CONTAINER_NAME=7dtd-game
    volumes:
      - ./data/serverfiles:/serverfiles
      - ./data/gamedata:/gamedata
      - ./data/config:/config
      - ./data/logs:/logs
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8090:8090"
    restart: unless-stopped
    stop_grace_period: 15s
